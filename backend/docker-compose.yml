services:
  # ─────────────────────────────────────────────
  # MySQL 8 (F3 — self-hosted DB for prod VPS)
  # Data persisted in a named volume so it survives container restarts.
  # ─────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: careerloop-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DB:-career_db}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PWD}
    volumes:
      - mysql_data:/var/lib/mysql
    expose:
      - "3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────
  # Redis 7 (F1 — cache, rate-limiting, wx token)
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: careerloop-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save 900 1 --save 300 10
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # CareerLoop Spring Boot backend.
  # Image is built from ./Dockerfile and runs the `prod` Spring profile.
  app:
    build: .
    image: careerloop-backend:latest
    container_name: careerloop-backend
    restart: unless-stopped
    # Map only to localhost so nginx (or another reverse proxy on the host)
    # owns TLS / public ingress. Don't expose 8080 to the world directly.
    ports:
      - "127.0.0.1:8080:8080"
    env_file:
      - .env.prod
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # The Spring app talks to the sidecar over the docker-compose network
      # using the service name. Override in .env.prod when running outside
      # compose (e.g. point to a managed Kubernetes service).
      BODY_LANG_SIDECAR_URL: ${BODY_LANG_SIDECAR_URL:-http://body-lang:8001}
      MYSQL_HOST: mysql
      REDIS_HOST: redis
      SPRING_FLYWAY_OUT_OF_ORDER: "true"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      body-lang:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # Body-language scoring sidecar (Sprint C-1).
  # FastAPI + MediaPipe; one POST /analyze endpoint that returns
  # { eye_contact, expression, posture } in [0..100].
  body-lang:
    build:
      context: ../body-lang-sidecar
    image: careerloop-body-lang:latest
    container_name: careerloop-body-lang
    restart: unless-stopped
    # Internal-only — the Spring backend reaches it through the compose
    # network. Don't expose to the host except for local debugging.
    expose:
      - "8001"
    mem_limit: 512m
    cpus: "0.5"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ─────────────────────────────────────────────
  # Uptime Kuma (F22 — production monitoring)
  # Accessible via Nginx reverse proxy at /kuma/
  # or directly on 127.0.0.1:3001 for SSH tunnel.
  # ─────────────────────────────────────────────
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: careerloop-uptime
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - uptime_kuma_data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  mysql_data:
  redis_data:
  uptime_kuma_data:
