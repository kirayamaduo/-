server:
  port: 8080

spring:
  application:
    name: career-backend-test

  # H2 in-memory DB so the integration tests don't need a real MySQL.
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      # Recreate schema for every test run so the in-memory DB is clean.
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    # Tests use Hibernate create-drop against H2. Production Flyway migrations
    # contain MySQL-specific DDL (multi-column ALTER + COMMENT clauses) that H2
    # cannot parse even in MySQL mode, so keep Flyway disabled for this profile.
    enabled: false

  # Mail is disabled at the SMTP-config level so EmailService can still
  # autowire; tests that exercise sending should @MockitoBean EmailService.
  mail:
    host: localhost
    port: 25
    username: test@test.com
    password: test
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
            required: false

# OSS / DashScope creds are only needed for live calls; mocks suffice.
aliyun:
  oss:
    endpoint: mock-endpoint
    access-key-id: mock-key-id
    access-key-secret: mock-key-secret
    bucket-name: mock-bucket
  ai:
    api-key: mock-api-key
    model: qwen-max
  voice:
    asr-model: paraformer-realtime-v2
    tts-model: cosyvoice-v2
    tts-voice: longxiaochun_v2

# WeChat creds — fail-safe defaults so the auth controller wires up,
# integration tests that exercise the WeChat flow should @MockitoBean
# UserService.wechatLogin.
wechat:
  miniapp:
    appid: test-appid
    secret: test-secret

# Phase 1 hardened JwtUtils to fail-fast when JWT_SECRET is missing or
# shorter than 32 bytes. The test profile injects a deterministic 64-char
# value so JwtConfig can wire successfully without polluting CI env vars.
jwt:
  secret: test-jwt-secret-test-jwt-secret-test-jwt-secret-test-jwt-secret-12
  expiration-ms: 604800000

bodylang:
  sidecar-url: ""
  enabled: false

logging:
  level:
    com.group1.career: DEBUG
    org.springframework.test: INFO
